server:
  port: 8081

spring:
  application:
    name: tournament

  datasource:
    url: jdbc:postgresql://localhost:5432/tournament
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 86400000
    refresh-token-expiration-ms: 604800000